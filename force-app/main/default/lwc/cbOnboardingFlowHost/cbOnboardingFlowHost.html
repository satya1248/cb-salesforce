<template>
    <div class="flow-shell">
        <c-cb-onboarding-guide guide-type={guideType}></c-cb-onboarding-guide>
        <div class="flow-toolbar slds-p-horizontal_medium slds-p-vertical_x-small">
            <lightning-button
                variant="base"
                label="Open in full page"
                title="Opens the flow in full-page mode if the Next button is hard to see"
                onclick={openFlowFullPage}
            ></lightning-button>
        </div>
        <div class="flow-host">
            <lightning-flow flow-api-name={flowApiName}></lightning-flow>
        </div>
    </div>
</template>
